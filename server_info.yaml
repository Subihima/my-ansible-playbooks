  tasks:
    - name: Get Disk Usage Fact
      set_fact:
        root_disk_size: "{{ (ansible_mounts | selectattr('mount', 'equalto', '/') | first).size_total | human_readable }}"

    - name: Display Clean System Info
      debug:
        msg:
          - "================ SERVER REPORT ================"
          - "Hostname      : {{ ansible_hostname }}"
          - "OS            : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "RAM           : {{ ansible_memtotal_mb }} MB"
          - "Total Disk (/) : {{ root_disk_size }}"
          - "IP Address    : {{ ansible_default_ipv4.address }}"
          - "==============================================="
